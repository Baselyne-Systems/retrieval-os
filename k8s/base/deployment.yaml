apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrieval-os
  labels:
    app: retrieval-os
spec:
  replicas: 3
  selector:
    matchLabels:
      app: retrieval-os
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: retrieval-os
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: retrieval-os
          image: retrieval-os:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: retrieval-os-config
                  key: ENVIRONMENT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: retrieval-os-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: retrieval-os-secrets
                  key: REDIS_URL
            - name: S3_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: retrieval-os-config
                  key: S3_BUCKET_NAME
            - name: QDRANT_HOST
              valueFrom:
                configMapKeyRef:
                  name: retrieval-os-config
                  key: QDRANT_HOST
            - name: QDRANT_GRPC_PORT
              valueFrom:
                configMapKeyRef:
                  name: retrieval-os-config
                  key: QDRANT_GRPC_PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: retrieval-os-config
                  key: LOG_LEVEL
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
